<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40">
  <defs>
    <linearGradient id="crystal-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#333333;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="40" height="40" rx="8" fill="url(#crystal-grad)"/>
  <!-- Crystal shape (hexagonal/diamond) -->
  <polygon points="20,5 32,13 32,27 20,35 8,27 8,13" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  <!-- Inner facets -->
  <line x1="20" y1="5" x2="20" y2="35" stroke="#FFFFFF" stroke-width="0.8" opacity="0.6"/>
  <line x1="8" y1="13" x2="32" y2="27" stroke="#FFFFFF" stroke-width="0.8" opacity="0.6"/>
  <line x1="32" y1="13" x2="8" y2="27" stroke="#FFFFFF" stroke-width="0.8" opacity="0.6"/>
  <!-- Center highlight -->
  <circle cx="20" cy="20" r="3" fill="#FFFFFF" opacity="0.8"/>
</svg>
